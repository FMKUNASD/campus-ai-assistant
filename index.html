<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校园智行助手</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img src="./assets/aigc-campus-illustration.png" alt="校园智行助手 AIGC 插图" />
          <div>
            <p class="eyebrow">Smart Campus</p>
            <h1>校园智行助手</h1>
          </div>
        </div>

        <nav class="nav">
          <button class="nav-item active" data-view="qa">校园问答</button>
          <button class="nav-item" data-view="plan">学习计划</button>
          <button class="nav-item" data-view="analysis">能耗分析</button>
        </nav>

        <section class="config">
          <h2>模型接口</h2>
          <label>
            接口类型
            <select id="apiType">
              <option value="mock" selected>离线演示</option>
              <option value="ollama">Ollama 本地</option>
              <option value="doubao">豆包（火山方舟）</option>
              <option value="deepseek">DeepSeek</option>
              <option value="openai">OpenAI 兼容</option>
            </select>
          </label>
          <label>
            API 地址
            <input id="apiUrl" value="local-demo" />
          </label>
          <label>
            模型名称
            <input id="modelName" value="demo-rule-model" />
          </label>
          <label>
            API Key
            <input id="apiKey" type="password" placeholder="云端接口填写，本地可留空" />
          </label>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">浙江树人学院《人工智能》课程大作业</p>
            <h2 id="viewTitle">校园问答</h2>
          </div>
          <span id="statusPill">离线演示模式</span>
        </header>

        <section class="panel view active" id="view-qa">
          <div class="panel-copy">
            <h3>AI 校园咨询台</h3>
            <p>输入课程、图书馆、食堂、社团等问题，系统会调用大模型生成回答；没有接口时也可以使用演示回复。</p>
          </div>
          <div class="chat-box" id="chatLog">
            <div class="message bot">你好，我是校园智行助手。可以问我“今天自习怎么安排”或“图书馆有什么使用建议”。</div>
          </div>
          <div class="composer">
            <input id="qaInput" value="帮我规划今天下午的校园学习路线" />
            <button id="qaSend">发送</button>
          </div>
        </section>

        <section class="panel view" id="view-plan">
          <div class="panel-copy">
            <h3>课程学习计划生成</h3>
            <p>填写课程和空闲时间，系统生成一份可执行的一日学习计划。</p>
          </div>
          <div class="form-grid">
            <label>课程名称<input id="courseName" value="人工智能"></label>
            <label>今日空闲时间<input id="freeTime" value="14:00-17:30"></label>
            <label class="wide">目标说明<input id="studyGoal" value="复习大模型 API、完成系统说明手册"></label>
          </div>
          <button id="planBtn">生成计划</button>
          <pre id="planOutput" class="result-box">点击“生成计划”后显示结果。</pre>
        </section>

        <section class="panel view" id="view-analysis">
          <div class="panel-copy">
            <h3>校园能耗数据分析</h3>
            <p>内置一组教学楼用电数据，点击按钮后计算高峰建筑并生成节能建议。</p>
          </div>
          <div class="stats">
            <div><strong id="totalPower">--</strong><span>总用电量 kWh</span></div>
            <div><strong id="peakRoom">--</strong><span>高峰建筑</span></div>
            <div><strong id="saveRate">--</strong><span>预计节能率</span></div>
          </div>
          <div class="chart" id="barChart"></div>
          <button id="analysisBtn">分析数据</button>
          <pre id="analysisOutput" class="result-box">点击“分析数据”后显示结果。</pre>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
